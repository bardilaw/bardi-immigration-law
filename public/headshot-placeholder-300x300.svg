<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <!-- Background -->
  <rect width="300" height="300" fill="#1B2A4A"/>

  <!-- Gold outer border -->
  <rect x="12" y="12" width="276" height="276" fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- Gold inner border -->
  <rect x="19" y="19" width="262" height="262" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>

  <!-- Monogram circle -->
  <circle cx="150" cy="98" r="36" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="150" cy="98" r="30" fill="#C9A84C" opacity="0.08"/>

  <!-- Monogram "EB" -->
  <text x="150" y="108" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="24" font-weight="700" fill="#C9A84C"
        text-anchor="middle" letter-spacing="3">EB</text>

  <!-- Top decorative line -->
  <line x1="44" y1="144" x2="256" y2="144" stroke="#C9A84C" stroke-width="0.75" opacity="0.6"/>

  <!-- Name -->
  <text x="150" y="175" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="20" font-weight="700" fill="#F5F4F0"
        text-anchor="middle" letter-spacing="1">Eszter Bardi, Esq.</text>

  <!-- Divider dot -->
  <circle cx="150" cy="196" r="1.5" fill="#C9A84C" opacity="0.7"/>

  <!-- Title -->
  <text x="150" y="218" font-family="Georgia, 'Times New Roman', serif"
        font-size="11" fill="#F5F4F0" opacity="0.75"
        text-anchor="middle" letter-spacing="2.5">IMMIGRATION ATTORNEY</text>

  <!-- License line -->
  <text x="150" y="237" font-family="Georgia, 'Times New Roman', serif"
        font-size="10" fill="#C9A84C" opacity="0.8"
        text-anchor="middle" letter-spacing="2">LICENSED  GA  |  AL</text>

  <!-- Bottom decorative line -->
  <line x1="44" y1="255" x2="256" y2="255" stroke="#C9A84C" stroke-width="0.75" opacity="0.6"/>

  <!-- Firm name -->
  <text x="150" y="277" font-family="Georgia, 'Times New Roman', serif"
        font-size="9" fill="#F5F4F0" opacity="0.4"
        text-anchor="middle" letter-spacing="2">BARDI IMMIGRATION LAW</text>
</svg>
