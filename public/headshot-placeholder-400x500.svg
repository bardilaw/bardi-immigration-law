<svg xmlns="http://www.w3.org/2000/svg" width="400" height="500" viewBox="0 0 400 500">
  <!-- Background -->
  <rect width="400" height="500" fill="#1B2A4A"/>

  <!-- Gold outer border -->
  <rect x="16" y="16" width="368" height="468" fill="none" stroke="#C9A84C" stroke-width="2"/>

  <!-- Gold inner border -->
  <rect x="24" y="24" width="352" height="452" fill="none" stroke="#C9A84C" stroke-width="0.5" opacity="0.5"/>

  <!-- Top decorative line -->
  <line x1="60" y1="160" x2="340" y2="160" stroke="#C9A84C" stroke-width="0.75" opacity="0.6"/>

  <!-- Bottom decorative line -->
  <line x1="60" y1="348" x2="340" y2="348" stroke="#C9A84C" stroke-width="0.75" opacity="0.6"/>

  <!-- Monogram circle -->
  <circle cx="200" cy="118" r="44" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <circle cx="200" cy="118" r="38" fill="#C9A84C" opacity="0.08"/>

  <!-- Monogram "EB" -->
  <text x="200" y="129" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="32" font-weight="700" fill="#C9A84C"
        text-anchor="middle" letter-spacing="4">EB</text>

  <!-- Name -->
  <text x="200" y="222" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="26" font-weight="700" fill="#F5F4F0"
        text-anchor="middle" letter-spacing="1">Eszter Bardi</text>

  <!-- Esq. -->
  <text x="200" y="254" font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-size="16" font-style="italic" fill="#C9A84C"
        text-anchor="middle" letter-spacing="2">Esq.</text>

  <!-- Divider dot -->
  <circle cx="200" cy="282" r="2" fill="#C9A84C" opacity="0.7"/>

  <!-- Title -->
  <text x="200" y="312" font-family="Georgia, 'Times New Roman', serif"
        font-size="13" fill="#F5F4F0" opacity="0.75"
        text-anchor="middle" letter-spacing="3">IMMIGRATION ATTORNEY</text>

  <!-- License line -->
  <text x="200" y="338" font-family="Georgia, 'Times New Roman', serif"
        font-size="11" fill="#C9A84C" opacity="0.8"
        text-anchor="middle" letter-spacing="2">LICENSED  GA  |  AL</text>

  <!-- Bottom accent: small scales-of-justice motif (abstract) -->
  <g transform="translate(200, 404)" opacity="0.35">
    <!-- Balance beam -->
    <line x1="-36" y1="0" x2="36" y2="0" stroke="#C9A84C" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="14" stroke="#C9A84C" stroke-width="1"/>
    <!-- Left pan -->
    <path d="M-36,0 Q-46,10 -26,10 Q-16,10 -36,0" fill="none" stroke="#C9A84C" stroke-width="0.75"/>
    <!-- Right pan -->
    <path d="M36,0 Q46,10 26,10 Q16,10 36,0" fill="none" stroke="#C9A84C" stroke-width="0.75"/>
    <!-- Base -->
    <line x1="-10" y1="14" x2="10" y2="14" stroke="#C9A84C" stroke-width="1"/>
  </g>

  <!-- Firm tagline -->
  <text x="200" y="460" font-family="Georgia, 'Times New Roman', serif"
        font-size="10" fill="#F5F4F0" opacity="0.45"
        text-anchor="middle" letter-spacing="2">BARDI IMMIGRATION LAW</text>
</svg>
